name: Quality

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [develop]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [frontend, backend]
    name: ${{ matrix.package }}
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: ${{ matrix.package }}/yarn.lock

      - name: Install dependencies
        run: yarn --frozen-lockfile --silent --network-timeout 1000000

      - name: Type check
        run: yarn type-check

      - name: Lint (warnings = errors)
        run: yarn lint

      - name: Dead code (knip)
        run: yarn knip
